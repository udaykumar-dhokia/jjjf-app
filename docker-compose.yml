version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: jjjf-mongodb
    restart: always
    ports:
      - "27017:27017"
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    volumes:
      - mongodb_data:/data/db

  mongo-init:
    image: mongo:7.0
    container_name: jjjf-mongo-init
    depends_on:
      - mongodb
    command: >
      mongosh --host mongodb:27017 --eval 
      'rs.initiate({_id: "rs0", members: [{_id: 0, host: "mongodb:27017"}]})'
    restart: "no"

  mongo-express:
    image: mongo-express:latest
    container_name: jjjf-mongo-express
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: adminpassword
    depends_on:
      - mongodb

  redis:
    image: redis:7-alpine
    container_name: jjjf-redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local
